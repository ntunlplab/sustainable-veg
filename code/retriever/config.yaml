model:
  # name: "BAAI/bge-m3"
  name: "BAAI/bge-large-zh-v1.5"
  # name: "shibing624/text2vec-bge-large-chinese"
  # name: "BAAI/bge-reranker-v2-m3"
  normalize: true
  regression: true

reranker:
  name: "BAAI/bge-reranker-v2-m3"
  top_k: 10
  threshold: 0.4

paths:
  sasb_metrics: "../metrics"
  sasb_database: "./sasb_db"
  faiss_index: "faiss.index"      
  vector_data: "vector_data.pkl" 
  train_data: "../../data/Sustainable-VEG.json"
  test_data: "../../data/Sustainable-VEG.json"
  ocr_output: "../ocr/ocr_olm/ocr_output"
  esg_reports_pdf: "../../data/reports"
  results_output: "./olm_train_result.csv"
  marked_results_output: "./draw_results"

  train_labels: ./train.csv     

train:
  batch_size: 8
  epochs: 3
  lr: 2e-5
  warmup_ratio: 0.1

threshold: 0.5
